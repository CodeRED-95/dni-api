services:
  db:
    image: postgres:16-alpine
    container_name: dni-api-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dni_api}
      POSTGRES_USER: ${POSTGRES_USER:-dni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dni_password}
    volumes:
      - dni_postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5433:5432"

  api:
    build: .
    container_name: dni-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8002:8000"

volumes:
  dni_postgres_data: